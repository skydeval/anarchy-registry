<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{% block title %}{{ base_domain }}{% endblock %}</title>
  <style>
    :root {
      --fg-main: #fdf4ff;
      --fg-muted: #c7b3d7;
      --shell-radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1.5rem;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--fg-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: {{ background }};
      background-size: cover;
      background-position: center;
    }
    /* Opaque dark shell matching the worker: a readable dark card that
       floats over any theme, so no per-theme "fog mode" toggle is
       needed. The subtle pink border picks up on the pride palette
       without depending on the background behind it. */
    .shell {
      position: relative;
      background: rgba(5, 0, 14, 0.82);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 134, 187, 0.55);
      padding: 2rem 2rem 1.5rem 2rem;
      border-radius: var(--shell-radius);
      max-width: 420px;
      width: 100%;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.8);
      color: var(--fg-main);
      z-index: 1;
    }
    /* The about page has more prose and can afford a wider, slightly
       more translucent card so the theme gradient reads through. */
    .shell.about-shell {
      max-width: 560px;
      background: rgba(5, 0, 14, 0.72);
    }
    .shell input {
      width: 100%;
      padding: 0.55rem 0.7rem;
      background: rgba(8, 0, 20, 0.9);
      border: 1px solid rgba(255, 134, 187, 0.35);
      border-radius: 6px;
      color: inherit;
      font-size: 1rem;
      font-family: inherit;
    }
    .shell input:focus {
      outline: 2px solid rgba(255,255,255,0.55);
      outline-offset: 1px;
    }
    .shell label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
      color: var(--fg-muted);
    }
    .shell h1 {
      margin: 0 0 0.8rem 0;
      font-size: 2rem;
      font-weight: 650;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }
    .shell p {
      margin: 0.7rem 0;
      line-height: 1.5;
      color: var(--fg-muted);
    }
    .shell code {
      background: rgba(0,0,0,0.25);
      padding: 0.05rem 0.35rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    /* .primary — matches the worker's muted-dark claim button
       (anarchy-worker.js §.primary / .btn-claim). Full-width inside the
       shell, rounded but not pill. */
    button.primary {
      width: 100%;
      display: block;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #334155;
      color: #f1f5f9;
      font-weight: 600;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    button.primary:hover:not(:disabled) {
      background: #60a5fa;
      border-color: #93c5fd;
      color: #0b1120;
    }
    button.primary:disabled {
      opacity: 0.6;
      cursor: default;
    }
    button.danger {
      padding: 0.35rem 0.75rem;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #ff3e5f, #ff7b8e);
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button.danger:hover { filter: brightness(1.08); }
    .hint {
      font-size: 0.9rem;
      color: var(--fg-muted);
    }
    /* The subdomain input overlays a rainbow-gradient ".base_domain"
       suffix on its right edge (see worker .handle-suffix). The wrapper
       is the positioning context; the input gets enough right-padding
       that typed text never collides with the suffix. */
    .handle-wrapper {
      position: relative;
      width: 100%;
    }
    .handle-wrapper input {
      width: 100%;
      padding-right: 7rem;
    }
    .handle-suffix {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.95rem;
      font-weight: 600;
      background: linear-gradient(
        90deg,
        #ff6b6b,
        #ffb347,
        #ffe76b,
        #51d88a,
        #4dabff,
        #b784ff
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.7);
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
    }
    .footer a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    /* Rainbow "?" link in the shell's top-left corner (index page only).
       Naked character, no tooltip, no circle — easter-egg energy. */
    .corner-q {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: transparent;
      background: linear-gradient(
        120deg,
        #f97316,
        #facc15,
        #22c55e,
        #0ea5e9,
        #8b5cf6,
        #ec4899
      );
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 0 6px rgba(0, 0, 0, 0.65),
        0 0 12px rgba(0, 0, 0, 0.85);
      z-index: 2;
    }
    .corner-q:hover { text-decoration: none; }

    /* Dice 🎲 + theme <select>, side by side. */
    .footer-left-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* §6 spec: 16px glyph, opacity 0.75 → 0.85 on hover, default cursor,
       no chrome. Lives in the footer flow. */
    .dice {
      font-size: 16px;
      color: rgba(255,255,255,0.92);
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      line-height: 1;
      opacity: 0.75;
      cursor: default !important;
      transition: opacity 0.15s ease;
    }
    .dice:hover { opacity: 0.85; }
    .dice:focus { outline: none; }
    .dice:focus-visible {
      outline: 1px solid white;
      outline-offset: 2px;
    }
    /* Custom theme picker: a button that opens an absolutely-positioned
       list of all themes. Lives inside a relative-position wrapper so
       the list anchors to the button's edge. Exists because native
       <select> doesn't fire `change` when you re-pick the already-
       selected option, and we want re-picking the active theme to
       still re-randomize the gradient direction. */
    .theme-picker {
      position: relative;
    }
    /* The trigger button reads as plain muted footer text at rest —
       no border, no fill, no pointer. Hidden-feature energy: the user
       only discovers it's interactive once they click. */
    .theme-picker-button {
      background: transparent;
      border: none;
      color: #c7b3d7;
      font-size: 0.78rem;
      padding: 4px 8px;
      cursor: default !important;
      font-family: inherit;
    }
    .theme-picker-list {
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 4px;
      min-width: 220px;
      background: rgba(8, 0, 20, 0.95);
      border: 1px solid rgba(120, 92, 160, 0.4);
      border-radius: 8px;
      padding: 4px 0;
      max-height: 300px;
      overflow-x: hidden;
      overflow-y: auto;
      z-index: 10;
      cursor: default !important;
    }
    .theme-picker-item {
      padding: 4px 12px;
      cursor: default !important;
      color: #c7b3d7;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .theme-picker-item:hover {
      background: rgba(120, 92, 160, 0.3);
    }

    /* Sigil + corner-badge: fixed-position, non-interactive overlay. */
    .sigil,
    .corner-badge {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      text-shadow: 0 4px 8px rgba(0,0,0,0.5), 0 0 18px rgba(0,0,0,0.4);
    }

    .secret-key-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .secret-key-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      margin-bottom: 0.4rem;
    }
    .secret-key-value code {
      display: inline-block;
      font-size: 1.1rem;
      padding: 0.4rem 0.6rem;
      word-break: break-all;
      cursor: pointer;
    }
    .master-key-highlight {
      margin-top: 0.8rem;
      font-size: 0.85rem;
    }
    .handle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .handle-row:last-child { border-bottom: none; }
    .status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--fg-muted);
    }
    .is-hidden { display: none; }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body data-theme="{{ theme.name }}">
  {% if deco.is_sigil %}
    <div class="sigil" style="{{ deco.placement_css }} color:{{ deco.color }};font-size:{{ deco.size_px }}px;font-weight:{{ deco.weight }};opacity:{{ deco.opacity }};">{{ deco.character }}</div>
  {% else if deco.is_badge %}
    <div class="corner-badge" data-corner="{{ deco.badge_corner }}" style="{{ deco.badge_corner_css }} width:160px;height:160px;opacity:0.98;">
      <svg viewBox="0 0 100 100" width="160" height="160" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="24" fill="none" stroke="#7a00ac" stroke-width="10"/>
      </svg>
    </div>
  {% endif %}

  <main class="shell{% block shell_class %}{% endblock %}">
    {% block shell_topleft %}{% endblock %}
    {% block content %}{% endblock %}
    <div class="footer">
      <div class="footer-left-group">
        <button class="dice" id="dice" type="button" aria-label="shuffle theme">🎲</button>
        <div class="theme-picker" id="theme-picker">
          <button
            class="theme-picker-button"
            id="theme-picker-button"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
          ></button>
          <div class="theme-picker-list is-hidden" id="theme-picker-list" role="listbox"></div>
        </div>
      </div>
      <div class="footer-right">
        {% block footer_right %}{% endblock %}
      </div>
    </div>
  </main>

  <script>
    // Theme controls: 🎲 dice for "surprise me" and a <select> for
    // "show me this one". Each apply() picks a random gradient
    // direction so the same theme can land on different orientations
    // between swaps. Mirrors the server's `DecorationView` +
    // `randomize_gradient_direction` logic so first paint and later
    // swaps stay consistent.
    (async () => {
      const dice = document.getElementById('dice');
      const picker = document.getElementById('theme-picker');
      const pickerButton = document.getElementById('theme-picker-button');
      const pickerList = document.getElementById('theme-picker-list');
      if (!dice || !picker || !pickerButton || !pickerList) return;
      let themes = [];
      try {
        const res = await fetch('/themes');
        if (res.ok) themes = await res.json();
      } catch (_) { return; }
      if (themes.length < 2) return;

      // Button shows the active theme name.
      pickerButton.textContent = document.body.dataset.theme;

      // Build one <div role="option"> per theme. Click on any item —
      // even the currently-active one — applies the theme (with a
      // fresh random gradient direction) and closes the list.
      for (const t of themes) {
        const item = document.createElement('div');
        item.className = 'theme-picker-item';
        item.setAttribute('role', 'option');
        item.textContent = t.name;
        item.addEventListener('click', () => {
          apply(t);
          closeList();
        });
        pickerList.appendChild(item);
      }

      function openList() {
        pickerList.classList.remove('is-hidden');
        pickerButton.setAttribute('aria-expanded', 'true');
      }
      function closeList() {
        pickerList.classList.add('is-hidden');
        pickerButton.setAttribute('aria-expanded', 'false');
      }
      pickerButton.addEventListener('click', () => {
        if (pickerList.classList.contains('is-hidden')) openList();
        else closeList();
      });

      // Close the list when clicking anywhere outside the picker.
      // Same-tick propagation: a click on the button first toggles the
      // list, then this handler fires but target is inside the picker
      // so it's a no-op — the list stays open.
      document.addEventListener('click', (e) => {
        if (!picker.contains(e.target)) closeList();
      });

      dice.addEventListener('click', () => {
        const current = document.body.dataset.theme;
        const pool = themes.filter(t => t.name !== current);
        const next = pool[Math.floor(Math.random() * pool.length)];
        apply(next);
      });

      const DIRECTIONS = ['to right', 'to bottom', '135deg', '45deg'];
      // Swap whatever direction sits in the first argument of
      // `linear-gradient(...)` with a fresh random pick. The capture
      // group lets us read the current direction so we can exclude it
      // from the pool — a reroll never lands on the same orientation
      // twice in a row. Must stay in sync with the Rust
      // `randomize_gradient_direction` on the server side.
      const GRADIENT_DIR_RE = /linear-gradient\(\s*([^,]+),/;
      function randomizeGradient(bg) {
        if (!bg.startsWith('linear-gradient')) return bg;
        const match = bg.match(GRADIENT_DIR_RE);
        const current = match ? match[1].trim() : null;
        const pool = DIRECTIONS.filter(d => d !== current);
        const dir = pool[Math.floor(Math.random() * pool.length)];
        return bg.replace(GRADIENT_DIR_RE, 'linear-gradient(' + dir + ',');
      }

      function apply(t) {
        document.body.style.background = randomizeGradient(t.background);
        document.body.dataset.theme = t.name;
        pickerButton.textContent = t.name;
        document.querySelectorAll('.sigil, .corner-badge').forEach(n => n.remove());
        const node = buildDecoration(t.decoration);
        if (node) document.body.insertBefore(node, document.body.firstChild);
      }

      function buildDecoration(d) {
        if (d.type === 'sigil') {
          const s = document.createElement('div');
          s.className = 'sigil';
          s.textContent = d.character;
          s.setAttribute('style', placementCss(d.placement) +
            'color:' + d.color + ';' +
            'font-size:' + d.size_px + 'px;' +
            'font-weight:' + d.weight + ';' +
            'opacity:' + d.opacity + ';');
          return s;
        }
        if (d.type === 'corner-badge') {
          const corners = ['top-left','top-right','bottom-left','bottom-right'];
          const corner = d.random_corner
            ? corners[Math.floor(Math.random()*4)]
            : 'bottom-right';
          const wrap = document.createElement('div');
          wrap.className = 'corner-badge';
          wrap.dataset.corner = corner;
          wrap.setAttribute('style', cornerCss(corner) + 'width:160px;height:160px;opacity:0.98;');
          wrap.innerHTML =
            '<svg viewBox="0 0 100 100" width="160" height="160" xmlns="http://www.w3.org/2000/svg">' +
              '<circle cx="50" cy="50" r="24" fill="none" stroke="#7a00ac" stroke-width="10"/>' +
            '</svg>';
          return wrap;
        }
        return null;
      }

      function placementCss(p) {
        return {
          'bottom-right': 'bottom:2rem;right:2rem;',
          'top-left':     'top:2rem;left:2rem;',
          'top-right':    'top:2rem;right:2rem;',
          'bottom-left':  'bottom:2rem;left:2rem;',
        }[p] || 'bottom:2rem;right:2rem;';
      }
      function cornerCss(c) {
        return {
          'top-left':     'top:2rem;left:2rem;',
          'top-right':    'top:2rem;right:2rem;',
          'bottom-left':  'bottom:2rem;left:2rem;',
          'bottom-right': 'bottom:2rem;right:2rem;',
        }[c] || 'bottom:2rem;right:2rem;';
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
